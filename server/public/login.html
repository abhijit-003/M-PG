<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PG Login / Register</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
    .tab-btn { background: none; border: none; padding: 1rem 2rem; cursor: pointer; font-size: 1rem; flex: 1; }
    .tab-active { background: #667eea; color: white; border-radius: 5px 5px 0 0; }
    .tab-content { display: none; padding: 1.5rem; }
    .tab-content.active { display: block; }
    input, select { width: 100%; padding: 0.75rem; margin: 0.5rem 0; border: 1px solid #ddd; border-radius: 5px; font-size: 1rem; }
button { width: 100%; padding: 1rem; background: #667eea; color: white; border: none; border-radius: 5px; font-size: 1rem; cursor: pointer; margin-top: 0.5rem; transition: background 0.3s; }
.tab-btn { background: none; border: none; padding: 1rem 2rem; cursor: pointer; font-size: 1rem; flex: 1; transition: background 0.3s; border-bottom: 2px solid transparent; }
.tab-active { background: #667eea; color: white; border-radius: 5px 5px 0 0; border-bottom-color: #667eea; }
    button:hover { background: #5a67d8; }
    .tabs { display: flex; margin-bottom: 0; }
    .error { color: red; font-size: 0.9rem; margin-top: 0.5rem; }
    .success { color: green; }
  </style>
</head>
<body>
  <div class="container">
    <h2 style="text-align: center; margin-bottom: 1rem; color: #333;">PG Management</h2>
    <div class="tabs">
<button class="tab-btn tab-active" onclick="switchTab('login', this)">Login</button>
      <button class="tab-btn" onclick="switchTab('register', this)">Register</button>
    </div>
    
    <!-- Login Tab -->
    <div id="login" class="tab-content active">
      <form id="loginForm">
        <input type="email" id="loginEmail" placeholder="Email" required>
        <input type="password" id="loginPassword" placeholder="Password" required>
        <select id="loginRole" required>
          <option value="">Select Role</option>
          <option value="admin">Admin</option>
          <option value="tenant">Tenant</option>
        </select>
        <button type="submit">Login</button>
      </form>
      <div id="loginMsg"></div>
    </div>
    
    <!-- Register Tab -->
    <div id="register" class="tab-content">
      <form id="registerForm">
        <input type="email" id="regEmail" placeholder="Email" required>
        <input type="password" id="regPassword" placeholder="Password" required>
        <select id="regRole" required>
          <option value="">Select Role</option>
          <option value="admin">Admin</option>
          <option value="tenant">Tenant</option>
        </select>
        <button type="submit">Register</button>
      </form>
      <div id="regMsg"></div>
    </div>
  </div>

  <script>
    function switchTab(tabName, button) {
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('tab-active'));
      document.getElementById(tabName).classList.add('active');
      button.classList.add('tab-active');
    }

    async function submitForm(formId, endpoint) {
      const form = document.getElementById(formId);
      const msgDiv = document.getElementById(formId === 'loginForm' ? 'loginMsg' : 'regMsg');
      msgDiv.innerHTML = '';
      
      const data = {
        email: form.querySelector('[type="email"]').value,
        password: form.querySelector('[type="password"]').value,
        role: form.querySelector('select').value
      };

      try {
        const res = await fetch(`http://localhost:5000/api/auth/${endpoint}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        const result = await res.json();
        
        if (res.ok) {
          if (endpoint === 'login') alert('Login success! Token: ' + result.token);
        } else {
          msgDiv.innerHTML = `<div class="error">${result.message}</div>`;
        }
      } catch (err) {
        msgDiv.innerHTML = `<div class="error">Network error: ${err.message}</div>`;
      }
    }

    document.getElementById('loginForm').onsubmit = (e) => {
      e.preventDefault();
      submitForm('loginForm', 'login');
    };
    document.getElementById('registerForm').onsubmit = (e) => {
      e.preventDefault();
      submitForm('registerForm', 'register');
    };
  </script>
</body>
</html>
